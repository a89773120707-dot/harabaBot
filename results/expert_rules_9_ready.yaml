partial_models_expert_rules:

  # ───────────── 1. Audi Q5 ─────────────
  audi_q5:
    name: "Audi Q5"
    priority: very_high
    years: "2012-2018"
    price_source: auto_ru_analyzer

    engines:
      best:
        - "2.0 TDI"
        - "3.0 TDI"
      acceptable:
        - "2.0 TFSI_only_after_diagnostics"
      avoid:
        - "2.0_TFSI_oil_consumption_history"
        - "unknown_timing_chain_history"

    transmissions:
      best:
        - "classic_automatic"
      acceptable:
        - "s_tronic_if_clean_diagnostics"
      avoid:
        - "mechatronic_errors"
        - "jerks_or_slips"

    mileage:
      excellent: "<130000"
      good: "130000-180000"
      penalty: "180000-230000"
      reject: "230000+ unless perfect"

    trims:
      best:
        - "s_line"
        - "top_trim"
      good:
        - "business"
        - "sport"
      acceptable:
        - "base"

    strong_bonus:
      - quattro
      - s_line
      - black_headliner
      - leather_or_alcantara
      - led_or_xenon
      - rear_camera
      - parking_sensors
      - panoramic_roof
      - good_multimedia
      - white_black_grey_color

    risk_check:
      - oil_consumption
      - timing_chain
      - water_pump
      - s_tronic
      - quattro_service
      - suspension
      - electronics

    reject:
      - red_autoteka
      - major_accident
      - engine_oil_burning
      - bad_engine
      - gearbox_errors
      - bad_gearbox
      - cheap_body_repair
      - twisted_mileage


