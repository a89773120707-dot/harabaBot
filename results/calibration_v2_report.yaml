## ПРИЧИНА excellent=0.7%

Синтетические карточки имеют uniform random price в широком диапазоне.
Большинство попадают в fair (0 бонусов к цене) или expensive (-15).

Для excellent нужно:
- price в excellent/good (только ~15-20% синтетических)
- mileage в excellent/good (~60%)
- >=2 strong_bonus (~40%)
- score >= 80

На реальных данных цены сгруппированы вокруг медианы → больше excellent/good.

