config_name: awd_liquid_9
description: 9 новых моделей из auto.ru evaluation — дополнение к ready_8
version: 0.1
architecture:
  search_filters: То, что реально выставляем на Haraba
  must_have: Жесткие условия допуска
  scoring_rules: Оценка объявления после парсинга
  risk_check: Что проверять вручную/по описанию/по диагностике
  market_rules: Правила цены и рыночной привлекательности
global_rules:
  search_strategy:
    rule: Поиск делаем шире, скоринг делаем жестче
    avoid_too_narrow_search: true
  global_reject:
  - red_autoteka
  - airbags_deployed
  - structural_damage
  - geometry_damage
  - heavy_accident
  - taxi
  - commercial_abuse
  - registration_ban
  - pledge
  - twisted_mileage_suspected
  global_bonus:
    green_autoteka: 25
    one_owner: 15
    two_owners: 10
    awd: 15
    top_trim: 15
    seven_seats: 15
    low_mileage: 15
    dealer_service_history: 10
    panorama: 8
    camera_360: 8
    leather: 6
    ventilation: 6
    good_color: 5
  global_penalty:
    three_owners: -5
    four_plus_owners: -20
    high_mileage: -15
    weak_trim: -15
    many_cosmetic_repairs: -15
    poor_interior: -10
    no_service_history: -10
    suspiciously_cheap: -25
    above_market_without_reason: -15
models:

# ───────────── 1. Audi Q5 ─────────────
- id: audi_q5
  name: Audi Q5
  priority: very_high
  segment: premium compact SUV
  search_filters:
    brand: Audi
    model: Q5
    year_from: 2012
    year_to: 2018
    price_from: 1726600
    price_to: 2289840
    transmission:
    - automatic
    - dsg
    fuel:
    - diesel
    - petrol
    drivetrain: awd
    regions: &id001
    - Москва и МО
    - Ярославская обл.
    - Тверская обл.
    - Владимирская обл.
    - Калужская обл.
    - Рязанская обл.
    - Тульская обл.
    legal_restrictions: none
    seller_type: private
    owners_range: 1-3
    condition: not_damaged
    mileage_max: 230000
  must_have:
  - green_autoteka
  - awd
  - no_major_accident
  - good_body
  scoring_rules:
    strong_plus:
    - quattro
    - s_line
    - black_headliner
    - leather_or_alcantara
    - led_or_xenon
    - rear_camera
    - parking_sensors
    - panoramic_roof
    - good_multimedia
    - white_black_grey_color
    medium_plus:
    - business
    - sport
    - one_owner
    - two_owners
    penalty:
    - 2_0_TFSI_oil_consumption_history
    - unknown_timing_chain_history
    - mileage_over_230000
    - 4_plus_owners
    - weak_trim
    - many_cosmetic_repairs
    reject:
    - red_autoteka
    - major_accident
    - engine_oil_burning
    - bad_engine
    - gearbox_errors
    - bad_gearbox
    - cheap_body_repair
    - twisted_mileage
  risk_check:
  - oil_consumption
  - timing_chain
  - water_pump
  - s_tronic
  - quattro_service
  - suspension
  - electronics
  market_rules:
    excellent_price: 1726600-1780000
    good_price: 1780000-2044500
    expensive_but_ok_if_top: 2044500-2289840
    reject_if_weak: 2453400+

