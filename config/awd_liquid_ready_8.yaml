config_name: awd_liquid_ready_8
description: Первые 8 почти готовых моделей для полноприводного поиска автосалона
version: 0.2
architecture:
  search_filters: То, что реально выставляем на Haraba
  must_have: Жесткие условия допуска
  scoring_rules: Оценка объявления после парсинга
  risk_check: Что проверять вручную/по описанию/по диагностике
  market_rules: Правила цены и рыночной привлекательности
global_rules:
  search_strategy:
    rule: Поиск делаем шире, скоринг делаем жестче
    avoid_too_narrow_search: true
  global_reject:
  - red_autoteka
  - airbags_deployed
  - structural_damage
  - geometry_damage
  - heavy_accident
  - taxi
  - commercial_abuse
  - registration_ban
  - pledge
  - twisted_mileage_suspected
  global_bonus:
    green_autoteka: 25
    one_owner: 15
    two_owners: 10
    awd: 15
    top_trim: 15
    seven_seats: 15
    low_mileage: 15
    dealer_service_history: 10
    panorama: 8
    camera_360: 8
    leather: 6
    ventilation: 6
    good_color: 5
  global_penalty:
    three_owners: -5
    four_plus_owners: -20
    high_mileage: -15
    weak_trim: -15
    many_cosmetic_repairs: -15
    poor_interior: -10
    no_service_history: -10
    suspiciously_cheap: -25
    above_market_without_reason: -15
models:
- id: kia_sorento_prime
  name: Kia Sorento Prime
  priority: very_high
  segment: 7-seat family crossover
